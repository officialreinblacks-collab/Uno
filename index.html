<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Studio | Advanced Text to Speech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            950: '#0a0a0c',
                            900: '#121214',
                            800: '#27272a',
                            700: '#3f3f46',
                        },
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'wave': 'wave 1.2s ease-in-out infinite',
                    },
                    keyframes: {
                        wave: {
                            '0%, 100%': { height: '8px' },
                            '50%': { height: '24px' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for a premium look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121214; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3f46; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6366f1; 
        }
        
        /* Audio Player overrides */
        audio::-webkit-media-controls-panel {
            background-color: #27272a;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }
        
        .glass-panel {
            background: rgba(39, 39, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }

        .voice-btn.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        
        /* Playing visualizer */
        .bar {
            width: 4px;
            border-radius: 4px;
            background-color: #6366f1;
            animation: wave 1s ease-in-out infinite;
        }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased selection:bg-brand-500 selection:text-white">

    <!-- Navbar -->
    <nav id="navbar-section" class="w-full glass-panel sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Aura <span class="text-gray-400 font-medium">Studio</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="hidden sm:inline-flex items-center gap-2 text-xs font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-full border border-emerald-400/20">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Systems Online
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main id="workspace-section" class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 flex flex-col lg:flex-row gap-6">
        
        <!-- Left Panel: Voice Selection -->
        <aside id="voice-sidebar" class="w-full lg:w-80 flex flex-col gap-4">
            <div class="bg-gray-900 rounded-2xl border border-gray-800 p-5 flex flex-col h-full shadow-xl">
                <div class="mb-4">
                    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Voice Actor</h2>
                    <p class="text-xs text-gray-500">Select an AI persona for your script.</p>
                </div>

                <!-- Search/Filter -->
                <div class="relative mb-4">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input type="text" id="voice-search" placeholder="Search voices..." class="w-full bg-gray-800 border border-gray-700 rounded-xl py-2 pl-9 pr-4 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                </div>

                <!-- Voice List Container -->
                <div id="voice-list" class="flex-grow overflow-y-auto space-y-2 pr-2 -mr-2 min-h-[250px] lg:min-h-0">
                    <!-- Voices populated via JS -->
                </div>
            </div>
        </aside>

        <!-- Right Panel: Editor & Controls -->
        <section id="editor-section" class="flex-grow flex flex-col gap-4">
            <div class="bg-gray-900 rounded-2xl border border-gray-800 flex flex-col shadow-xl overflow-hidden min-h-[400px]">
                
                <!-- Editor Toolbar -->
                <div class="border-b border-gray-800 px-5 py-3 flex items-center justify-between bg-gray-900/50">
                    <div class="flex gap-2">
                        <button onclick="insertTag('pause')" class="text-xs font-medium text-gray-400 hover:text-white px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 transition-colors" title="Add pause">
                            + Pause
                        </button>
                        <button onclick="insertTag('emotion')" class="text-xs font-medium text-gray-400 hover:text-white px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 transition-colors" title="Hint: Write 'Say cheerfully: ' before text">
                            + Emotion Hint
                        </button>
                    </div>
                    <div class="text-xs text-gray-500 font-mono">
                        <span id="char-count">0</span> / 2500
                    </div>
                </div>

                <!-- Text Area -->
                <textarea id="text-input" class="w-full flex-grow bg-transparent text-gray-200 p-5 resize-none focus:outline-none text-base leading-relaxed placeholder-gray-600" placeholder="Enter your script here... For example:&#10;&#10;Say excitedly: Welcome to the future of voice generation.&#10;&#10;It's great to have you here!"></textarea>

                <!-- Action Bar -->
                <div class="border-t border-gray-800 px-5 py-4 bg-gray-900/80 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <div id="selected-voice-display" class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-brand-500/20 border border-brand-500/30 flex items-center justify-center text-brand-400 font-bold text-xs uppercase" id="sv-initial">K</div>
                            <div>
                                <p class="text-sm font-medium text-white" id="sv-name">Kore</p>
                                <p class="text-xs text-gray-500">Selected Model</p>
                            </div>
                        </div>
                    </div>
                    
                    <button id="generate-btn" class="w-full sm:w-auto relative group overflow-hidden rounded-xl bg-brand-600 text-white font-medium px-8 py-3 shadow-lg shadow-brand-500/20 hover:bg-brand-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <span id="btn-text">Generate Speech</span>
                        <svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        
                        <!-- Loading spinner hidden by default -->
                        <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Output Player Section (Hidden initially) -->
            <div id="player-container" class="hidden bg-gray-900 rounded-2xl border border-gray-800 p-5 shadow-xl transition-all duration-500 opacity-0 transform translate-y-4">
                <div class="flex flex-col sm:flex-row items-center gap-4">
                    
                    <button id="play-pause-btn" class="w-12 h-12 flex-shrink-0 rounded-full bg-white text-black flex items-center justify-center hover:bg-gray-200 transition-colors shadow-lg active:scale-95">
                        <svg id="play-icon" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>
                        </svg>
                        <svg id="pause-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                    </button>

                    <div class="flex-grow w-full">
                        <div class="flex justify-between items-end mb-2">
                            <h3 class="text-sm font-semibold text-white">Generated Audio</h3>
                            <span id="time-display" class="text-xs text-gray-500 font-mono">0:00 / 0:00</span>
                        </div>
                        
                        <!-- Visualizer (Fake for aesthetic, moves when playing) -->
                        <div class="h-8 bg-gray-800 rounded-lg flex items-center justify-center gap-1 overflow-hidden relative">
                            <!-- Native Audio (Hidden visually, controls logic) -->
                            <audio id="native-audio" class="hidden"></audio>
                            
                            <div class="absolute inset-0 bg-gray-800 flex items-center gap-[2px] px-2 opacity-50" id="visualizer-bars">
                                <!-- Bars populated by JS -->
                            </div>
                            <!-- Custom Progress bar -->
                            <div class="absolute inset-0 z-10 cursor-pointer" id="progress-container">
                                <div id="progress-bar" class="h-full bg-brand-500/30 border-r-2 border-brand-500 w-0 transition-all duration-75"></div>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <a id="download-btn" href="#" download="speech.wav" class="p-2.5 rounded-xl bg-gray-800 text-gray-400 hover:text-white hover:bg-gray-700 transition-colors tooltip-trigger" title="Download WAV">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Custom Message Box Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // API Configuration
        const apiKey = "AIzaSyBWb-83mBbiFG9QlcaX2tIpfkJ2Qu1Md5M"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

        // Available Voices
        const VOICES = [
            "Zephyr", "Puck", "Charon", "Kore", "Fenrir", "Leda", "Orus", "Aoede", 
            "Callirrhoe", "Autonoe", "Enceladus", "Iapetus", "Umbriel", "Algieba", 
            "Despina", "Erinome", "Algenib", "Rasalgethi", "Laomedeia", "Achernar", 
            "Alnilam", "Schedar", "Gacrux", "Pulcherrima", "Achird", "Zubenelgenubi", 
            "Vindemiatrix", "Sadachbia", "Sadaltager", "Sulafat"
        ];

        // State
        let selectedVoice = "Kore";
        let isGenerating = false;
        let isPlaying = false;
        let audioBlobUrl = null;

        // DOM Elements
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const generateBtn = document.getElementById('generate-btn');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');
        const btnSpinner = document.getElementById('btn-spinner');
        const voiceSearch = document.getElementById('voice-search');
        const voiceListContainer = document.getElementById('voice-list');
        const svName = document.getElementById('sv-name');
        const svInitial = document.getElementById('sv-initial');
        const playerContainer = document.getElementById('player-container');
        const nativeAudio = document.getElementById('native-audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeDisplay = document.getElementById('time-display');
        const downloadBtn = document.getElementById('download-btn');
        const visualizerBars = document.getElementById('visualizer-bars');

        // Setup Init
        function init() {
            renderVoices(VOICES);
            setupEventListeners();
            generateVisualizerBars();
        }

        // Render Voice List
        function renderVoices(voicesToRender) {
            voiceListContainer.innerHTML = '';
            
            if(voicesToRender.length === 0) {
                voiceListContainer.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">No voices found</p>';
                return;
            }

            voicesToRender.forEach(voice => {
                const isActive = voice === selectedVoice;
                const btn = document.createElement('button');
                btn.className = `voice-btn w-full text-left p-3 rounded-xl border ${isActive ? 'active border-brand-500 bg-brand-500/10' : 'border-gray-800 bg-gray-800/50 hover:bg-gray-800 hover:border-gray-700'} transition-all flex items-center gap-3 group`;
                
                // Color variation for initials based on name length just to add visual variety
                const colors = ['bg-indigo-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500', 'bg-cyan-500'];
                const colorClass = colors[voice.length % colors.length];

                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-full ${colorClass} bg-opacity-20 flex items-center justify-center border border-${colorClass.replace('bg-', 'border-')}/30 flex-shrink-0">
                        <span class="text-${colorClass.replace('bg-', '')} text-xs font-bold">${voice.charAt(0)}</span>
                    </div>
                    <div class="flex-grow">
                        <p class="text-sm font-medium text-gray-200 group-hover:text-white transition-colors">${voice}</p>
                    </div>
                    ${isActive ? `<svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>` : ''}
                `;
                
                btn.onclick = () => selectVoice(voice);
                voiceListContainer.appendChild(btn);
            });
        }

        function selectVoice(voice) {
            selectedVoice = voice;
            svName.textContent = voice;
            svInitial.textContent = voice.charAt(0);
            renderVoices(VOICES.filter(v => v.toLowerCase().includes(voiceSearch.value.toLowerCase())));
        }

        function setupEventListeners() {
            // Text Input Counter
            textInput.addEventListener('input', () => {
                const len = textInput.value.length;
                charCount.textContent = len;
                if(len > 2500) {
                    textInput.value = textInput.value.substring(0, 2500);
                    charCount.textContent = 2500;
                    showToast('Maximum character limit reached.', 'warning');
                }
            });

            // Voice Search
            voiceSearch.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = VOICES.filter(v => v.toLowerCase().includes(query));
                renderVoices(filtered);
            });

            // Generate Button
            generateBtn.addEventListener('click', handleGenerate);

            // Audio Player Controls
            playPauseBtn.addEventListener('click', togglePlayPause);
            nativeAudio.addEventListener('timeupdate', updateProgress);
            nativeAudio.addEventListener('ended', onAudioEnded);
            nativeAudio.addEventListener('loadedmetadata', updateProgress);
            
            // Progress Bar Seek
            progressContainer.addEventListener('click', (e) => {
                if(!nativeAudio.duration) return;
                const rect = progressContainer.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                nativeAudio.currentTime = pos * nativeAudio.duration;
            });
        }

        // Helpers for Editor
        window.insertTag = (type) => {
            const start = textInput.selectionStart;
            const end = textInput.selectionEnd;
            const text = textInput.value;
            let insertStr = '';
            
            if (type === 'pause') {
                insertStr = ' ... ';
            } else if (type === 'emotion') {
                insertStr = 'Say cheerfully: ';
            }
            
            textInput.value = text.slice(0, start) + insertStr + text.slice(end);
            textInput.focus();
            textInput.selectionStart = textInput.selectionEnd = start + insertStr.length;
            textInput.dispatchEvent(new Event('input'));
        };

        // Generation Logic
        async function handleGenerate() {
            const text = textInput.value.trim();
            if(!text) {
                showToast('Please enter some text to generate speech.', 'error');
                return;
            }

            if(isGenerating) return;
            setGeneratingState(true);

            try {
                const pcmData = await fetchAudioWithRetry(text, selectedVoice);
                
                // Assuming default gemini TTS output rate is 24000Hz mono 16-bit
                const wavBlob = pcmToWav(pcmData, 24000);
                
                if(audioBlobUrl) URL.revokeObjectURL(audioBlobUrl);
                audioBlobUrl = URL.createObjectURL(wavBlob);
                
                setupAudioPlayer(audioBlobUrl);
                showToast('Audio generated successfully!', 'success');
                
            } catch (error) {
                console.error("TTS Error:", error);
                showToast('Failed to generate audio. Please try again.', 'error');
            } finally {
                setGeneratingState(false);
            }
        }

        function setGeneratingState(isGen) {
            isGenerating = isGen;
            if(isGen) {
                btnText.textContent = "Generating...";
                btnIcon.classList.add('hidden');
                btnSpinner.classList.remove('hidden');
                generateBtn.classList.add('opacity-80', 'cursor-not-allowed');
                // Hide player if generating new
                playerContainer.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => playerContainer.classList.add('hidden'), 500);
            } else {
                btnText.textContent = "Generate Speech";
                btnIcon.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                generateBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // API Call with Exponential Backoff
        async function fetchAudioWithRetry(text, voice, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: voice }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const result = await response.json();
                    
                    if(result.candidates && result.candidates[0].content.parts[0].inlineData) {
                        const base64Data = result.candidates[0].content.parts[0].inlineData.data;
                        return base64ToUint8Array(base64Data);
                    } else {
                        throw new Error("Invalid API response structure");
                    }
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // Base64 to Binary string to Uint8Array
        function base64ToUint8Array(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        // PCM to WAV Conversion logic
        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1; // Mono
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            // RIFF header
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true); // File size
            writeString(8, 'WAVE');
            
            // fmt subchunk
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true); // Subchunk1Size
            view.setUint16(20, 1, true); // AudioFormat (PCM)
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            
            // data subchunk
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            // Write PCM data
            const pcmArray = new Uint8Array(buffer, 44);
            pcmArray.set(pcmData);

            return new Blob([buffer], { type: 'audio/wav' });
        }

        // Player Setup
        function setupAudioPlayer(url) {
            nativeAudio.src = url;
            downloadBtn.href = url;
            
            // Show player
            playerContainer.classList.remove('hidden');
            // Allow display block to render before animating opacity
            setTimeout(() => {
                playerContainer.classList.remove('opacity-0', 'translate-y-4');
                nativeAudio.play();
                isPlaying = true;
                updatePlayButtonUI();
                startVisualizer();
            }, 50);
        }

        function togglePlayPause() {
            if(!nativeAudio.src) return;
            
            if (nativeAudio.paused) {
                nativeAudio.play();
                isPlaying = true;
                startVisualizer();
            } else {
                nativeAudio.pause();
                isPlaying = false;
                stopVisualizer();
            }
            updatePlayButtonUI();
        }

        function onAudioEnded() {
            isPlaying = false;
            updatePlayButtonUI();
            stopVisualizer();
            progressBar.style.width = '0%';
        }

        function updatePlayButtonUI() {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            if (nativeAudio.duration) {
                const percent = (nativeAudio.currentTime / nativeAudio.duration) * 100;
                progressBar.style.width = `${percent}%`;
                timeDisplay.textContent = `${formatTime(nativeAudio.currentTime)} / ${formatTime(nativeAudio.duration)}`;
            }
        }

        // Fake Visualizer UI
        function generateVisualizerBars() {
            visualizerBars.innerHTML = '';
            for(let i=0; i<80; i++) {
                const bar = document.createElement('div');
                bar.className = 'w-1 bg-gray-600 rounded-full transition-all duration-100 opacity-30';
                bar.style.height = '4px'; // default state
                visualizerBars.appendChild(bar);
            }
        }

        let visualizerInterval;
        function startVisualizer() {
            const bars = visualizerBars.children;
            clearInterval(visualizerInterval);
            visualizerInterval = setInterval(() => {
                for(let i=0; i<bars.length; i++) {
                    const height = Math.random() * 24 + 4; // 4px to 28px
                    bars[i].style.height = `${height}px`;
                    bars[i].classList.replace('bg-gray-600', 'bg-brand-500');
                    bars[i].classList.replace('opacity-30', 'opacity-100');
                }
            }, 100);
        }

        function stopVisualizer() {
            clearInterval(visualizerInterval);
            const bars = visualizerBars.children;
            for(let i=0; i<bars.length; i++) {
                bars[i].style.height = '4px';
                bars[i].classList.replace('bg-brand-500', 'bg-gray-600');
                bars[i].classList.replace('opacity-100', 'opacity-30');
            }
        }

        // Custom Toast Notification System
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            
            let bgClass = 'bg-gray-800 border-gray-700 text-white';
            let icon = '';
            
            if (type === 'success') {
                bgClass = 'bg-emerald-900/90 border-emerald-800 text-emerald-100';
                icon = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else if (type === 'error') {
                bgClass = 'bg-red-900/90 border-red-800 text-red-100';
                icon = `<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else if (type === 'warning') {
                bgClass = 'bg-amber-900/90 border-amber-800 text-amber-100';
                icon = `<svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl border shadow-lg transform transition-all duration-300 translate-y-10 opacity-0 ${bgClass}`;
            toast.innerHTML = `
                ${icon}
                <p class="text-sm font-medium">${message}</p>
            `;
            
            document.getElementById('toast-container').appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            // Remove after 3s
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
